services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codemig
      POSTGRES_PASSWORD: codemig
      POSTGRES_DB: code_migration
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemig -d code_migration"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: postgresql://codemig:codemig@postgres:5432/code_migration
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_ORG_ID: ${OPENAI_ORG_ID:-}
      OPENAI_PROJECT: ${OPENAI_PROJECT:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-300}
      SOURCE_CODE_MAX_BYTES: ${SOURCE_CODE_MAX_BYTES:-0}
      OPENAI_AUTO_CHUNK: ${OPENAI_AUTO_CHUNK:-true}
      OPENAI_CHUNK_CHARS: ${OPENAI_CHUNK_CHARS:-80000}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-2}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-16384}
      API_HOST: 0.0.0.0
      API_PORT: 8090
      SAAS_ENABLED: ${SAAS_ENABLED:-true}
      SAAS_REQUIRE_API_KEY: ${SAAS_REQUIRE_API_KEY:-false}
      SAAS_ADMIN_SECRET: ${SAAS_ADMIN_SECRET:-change-me-admin-secret}
      SAAS_DEFAULT_TENANT_SLUG: ${SAAS_DEFAULT_TENANT_SLUG:-default}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        API_URL: http://api:8090
    ports:
      - "${WEB_PUBLISH_PORT:-3001}:3000"
    environment:
      API_URL: http://api:8090
    depends_on:
      - api

volumes:
  pgdata:
